version: "3.9"
services:
  app:
    build: .
    container_name: dental_app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://admin:password123@db:5432/dental_clinic
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: python main.py

  db:
    image: postgres:15
    container_name: dental_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: dental_clinic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: